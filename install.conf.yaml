- shell:
    - command: mkdir -p ~/.config/fish
      description: Ensure fish config dir
    # Merge MCP servers into ~/.claude.json (file holds runtime state, can't symlink)
    - command: |
        if command -v jq >/dev/null 2>&1; then
          CLAUDE_JSON="$HOME/.claude.json"
          MCP_JSON="claude/mcpServers.json"
          if [ -f "$CLAUDE_JSON" ]; then
            jq --slurpfile mcp "$MCP_JSON" '.mcpServers = $mcp[0]' "$CLAUDE_JSON" > /tmp/claude.json.tmp && mv /tmp/claude.json.tmp "$CLAUDE_JSON"
          else
            jq -n --slurpfile mcp "$MCP_JSON" '{mcpServers: $mcp[0]}' > "$CLAUDE_JSON"
          fi
          echo "Merged MCP servers into $CLAUDE_JSON"
        else
          echo "WARNING: jq not found, skipping Claude Code MCP merge"
        fi
      description: Merging Claude Code MCP servers
