- defaults:
    link:
      relink: true
      create: true

- clean: ["~"]

- create:
    - ~/.vim/undo-history
    - ~/.claude
    - ~/.claude/skills
    - ~/.codex
    - ~/.codex/skills
    - ~/.config/fish
    - ~/.config/opencode
    - ~/.gemini

# Shell / editor / git / WSL utility links
- link:
    ~/.tmux.conf: tmux.conf
    ~/.vimrc: vimrc
    ~/.gitconfig: gitconfig
    ~/.bash_aliases: bash_aliases
    ~/.config/fish/config.fish: config.fish
    ~/.config/fish/functions: fish/functions

# AI tool instructions — all four tools share one doctrine file (shared/AGENTS.md)
- link:
    ~/.claude/CLAUDE.md:
      path: shared/AGENTS.md
      force: true
    ~/.codex/AGENTS.md:
      path: shared/AGENTS.md
      force: true
    ~/.config/opencode/AGENTS.md:
      path: shared/AGENTS.md
      force: true
    ~/.gemini/antigravity-cli/AGENTS.md:
      path: shared/AGENTS.md
      force: true

# AI tool settings + MCP configs
- link:
    ~/.claude/settings.json:
      path: claude/settings.json
      force: true
    ~/.claude/statusline.sh:
      path: claude/statusline.sh
      force: true
    ~/.claude/hooks/timestamp-display.sh:
      path: claude/hooks/timestamp-display.sh
      force: true
    ~/.codex/config.toml:
      path: codex/config.toml
      force: true
    ~/.config/opencode/config.json:
      path: opencode/config.json
      force: true
    ~/.gemini/antigravity-cli/settings.json:
      path: antigravity/settings.json
      force: true
    ~/.grok/config.toml:
      path: grok/config.toml
      force: true
    ~/.grok/AGENTS.md:
      path: grok/AGENTS.md
      force: true

