model = "gpt-5.5"
personality = "pragmatic"
# xhigh: deepest reasoning tier, matches Claude Code's xhigh default.
# ~2x quota burn vs high; flip to high per-task via /effort to conserve.
model_reasoning_effort = "xhigh"
approval_policy = "never"
sandbox_mode = "danger-full-access"
web_search = "live"
suppress_unstable_features_warning = true
tool_output_token_limit = 25000
# Leave room for native compaction near the 272-273k context window.
# Formula: 273000 - (tool_output_token_limit + 15000)
# With tool_output_token_limit=25000 => 273000 - (25000 + 15000) = 233000
model_auto_compact_token_limit = 233000
project_doc_fallback_filenames = ["CLAUDE.md"]
service_tier = "default"

[features]
unified_exec = true
apply_patch_freeform = true
shell_snapshot = true

[analytics]
# Disable anonymous telemetry to OpenAI
enabled = false

[history]
# Cap ~/.codex/history.jsonl growth (rollout files under ~/.codex/sessions/
# are NOT cleaned up by Codex itself — see external cron tier 3).
max_bytes = 104857600

