model = "gpt-5.6-sol"
personality = "pragmatic"
# GPT-5.6 Sol efforts: low/medium/high/xhigh/max/ultra (ultra = auto subagent
# delegation, Pro/Business-only). OpenAI's default is medium ("Sol is highly
# capable at lower reasoning efforts"); xhigh = deep-by-default, mirrors the
# Claude Code effortLevel. Drop to high/medium via /effort to conserve quota;
# max/ultra stay as per-task escalation.
model_reasoning_effort = "xhigh"
# Plan mode benefits from deeper reasoning than execution.
plan_mode_reasoning_effort = "xhigh"
approval_policy = "never"
sandbox_mode = "danger-full-access"
web_search = "live"
suppress_unstable_features_warning = true
tool_output_token_limit = 25000
# Leave room for native compaction near GPT-5.6's 372k context window.
# Formula: 372000 - (tool_output_token_limit + 15000)
# With tool_output_token_limit=25000 => 372000 - (25000 + 15000) = 332000
model_auto_compact_token_limit = 332000
project_doc_fallback_filenames = ["CLAUDE.md"]
service_tier = "default"

[features]
unified_exec = true
apply_patch_freeform = true
shell_snapshot = true

[analytics]
# Disable anonymous telemetry to OpenAI
enabled = false

[history]
# Cap ~/.codex/history.jsonl growth (rollout files under ~/.codex/sessions/
# are NOT cleaned up by Codex itself — see external cron tier 3).
max_bytes = 104857600

